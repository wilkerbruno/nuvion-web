version: "3.8"

# ══════════════════════════════════════════════════════════════════════════════
# Nuvion Browser — Easypanel via COMPOSE SERVICE
#
# No Easypanel:
#   1. Crie um projeto  →  "+ Service"  →  escolha "App"
#      Source: GitHub  →  seu repositório  →  Branch: main
#      Build: Dockerfile  →  deixe o path em branco (raiz)   ← IMPORTANTE
#      Não use "Nixpacks", sempre escolha "Dockerfile"
#
#   OU (mais simples):
#   1. Crie um projeto  →  "+ Service"  →  escolha "Compose"
#   2. Cole este arquivo INTEIRO
#   3. Deploy
#
# EDITE ANTES DO DEPLOY:
#   - Troque  app.seudominio.com  →  domínio real do frontend
#   - Troque  api.seudominio.com  →  domínio real da API
#   - Troque  SECRET_KEY          →  saída de: python -c "import secrets;print(secrets.token_hex(32))"
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API FastAPI ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DB_HOST: "2.25.131.174"
      DB_PORT: "33060"
      DB_NAME: "browser"
      DB_USER: "admin"
      DB_PASSWORD: "V71C2Fd1eqJ8p0Pn0x4aO5mW"
      SECRET_KEY: "COLE_SUA_SECRET_KEY_AQUI"
      FRONTEND_URL: "https://app.seudominio.com"
      CORS_ORIGINS: '["https://app.seudominio.com"]'
      REDIS_URL: "redis://redis:6379/0"
      MP_WEBHOOK_SECRET: ""
      DEBUG: "false"

  # ── Worker Chrome/Celery ────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    shm_size: "1gb"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DB_HOST: "2.25.131.174"
      DB_PORT: "33060"
      DB_NAME: "browser"
      DB_USER: "admin"
      DB_PASSWORD: "V71C2Fd1eqJ8p0Pn0x4aO5mW"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "COLE_SUA_SECRET_KEY_AQUI"
      DISPLAY: ":99"
      CHROME_BIN: "/usr/bin/chromium"
      CHROMEDRIVER_PATH: "/usr/bin/chromedriver"
    volumes:
      - chrome_profiles:/tmp/nuvion_profiles

  # ── Frontend React/Nginx ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "https://api.seudominio.com/api"
        VITE_WS_URL: "wss://api.seudominio.com"
    restart: unless-stopped
    depends_on:
      - api

volumes:
  redis_data:
  chrome_profiles:
