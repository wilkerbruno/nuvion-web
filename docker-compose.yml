version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Nuvion Browser — Docker Compose para Easypanel
#
# ANTES DE FAZER DEPLOY, altere:
#   1. FRONTEND_URL e CORS_ORIGINS  → seu domínio real do frontend
#   2. VITE_API_URL e VITE_WS_URL  → seu domínio real da api
#   3. SECRET_KEY                   → gere com: openssl rand -hex 32
# ─────────────────────────────────────────────────────────────────────────────

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DB_HOST: "2.25.131.174"
      DB_PORT: "33060"
      DB_NAME: "browser"
      DB_USER: "admin"
      DB_PASSWORD: "V71C2Fd1eqJ8p0Pn0x4aO5mW"
      SECRET_KEY: "TROQUE-ESTA-CHAVE-MINIMO-32-CHARS"
      FRONTEND_URL: "https://app.seudominio.com"
      CORS_ORIGINS: '["https://app.seudominio.com"]'
      REDIS_URL: "redis://redis:6379/0"
      MP_WEBHOOK_SECRET: ""
      DEBUG: "false"

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    shm_size: "1gb"
    environment:
      DB_HOST: "2.25.131.174"
      DB_PORT: "33060"
      DB_NAME: "browser"
      DB_USER: "admin"
      DB_PASSWORD: "V71C2Fd1eqJ8p0Pn0x4aO5mW"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "TROQUE-ESTA-CHAVE-MINIMO-32-CHARS"
      DISPLAY: ":99"
      CHROME_BIN: "/usr/bin/chromium"
      CHROMEDRIVER_PATH: "/usr/bin/chromedriver"
    volumes:
      - chrome_profiles:/tmp/nuvion_profiles

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "https://api.seudominio.com/api"
        VITE_WS_URL: "wss://api.seudominio.com"
    restart: unless-stopped
    depends_on:
      - api

volumes:
  redis_data:
  chrome_profiles:
